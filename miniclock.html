<!DOCTYPE html>
<html>
<head>
    <title>Mini Clock</title>
    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#5227c0;
        }

        .clock{
            background:white;
            padding:20px 30px;
            border:2px solid black;
            border-radius:10px;
            font-family:Arial, sans-serif;
            font-size:40px;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <div class="clock" id="time">
        12:00:00 AM
    </div>

    <script>
        function updateClock() {

            let now = new Date();

            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            let ampm = "AM";

            if(hours >= 12){
                ampm = "PM";
            }

            if(hours > 12){
                hours = hours - 12;
            }

            if(hours == 0){
                hours = 12;
            }

            if(hours < 10){
                hours = "0" + hours;
            }

            if(minutes < 10){
                minutes = "0" + minutes;
            }

            if(seconds < 10){
                seconds = "0" + seconds;
            }

            document.getElementById("time").innerHTML =
                hours + ":" + minutes + ":" + seconds + " " + ampm;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
